<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Page Embed</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* ❌ ไม่ให้มี scroll ซ้อน */
      font-family: sans-serif;
    }

    .embed-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    .embed-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

  </style>
</head>

<body>

  <div class="embed-container">
    <!--🔽 เปลี่ยนลิงก์ตรง src เป็นเว็บที่ต้องการฝัง -->
    <iframe 
      src="https://script.google.com/macros/s/AKfycbyQfh3X1r0gbcxa0-xF8xQ0n6--g_71RCQLLkbBgOoHEJIvSHEFE4r7XUdoAHGqf9wU/exec" 
      allowfullscreen
      loading="lazy">
    </iframe>
  </div>
  


</body>
</html>
