<script>
function goPage(type) {
    Swal.fire({
        title: 'กำลังเข้าสู่ระบบ...',
        text: type === 'doc' ? 'ไปยังส่งหนังสือราชการ' : 'ไปยังคำสั่งโรงเรียน',
        icon: 'info',
        timer: 1200,
        showConfirmButton: false
    }).then(() => {
        if(type === 'doc'){
            window.location.href = 'send.html';
        } else {
            window.location.href = 'order.html';
        }
    });
}
</script>
